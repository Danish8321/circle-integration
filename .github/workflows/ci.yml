name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet tool restore
      - run: dotnet restore TreasuryServiceOrchestrator.slnx
      - name: check
        run: sh .claude/scripts/check.sh

  contract:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore TreasuryServiceOrchestrator.slnx
      - name: contract
        run: sh .claude/scripts/contract.sh

  test-full:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet tool restore
      - run: dotnet restore TreasuryServiceOrchestrator.slnx
      - name: test-full
        run: sh .claude/scripts/test-full.sh
